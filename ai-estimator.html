<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saylin AI Estimator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#0d2d52;
color:white;
text-align:center;
padding:40px;
}

section{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:15px;
margin:10px 0;
font-size:16px;
}

button{
background:#f4b400;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:22px;
font-weight:bold;
color:#0d2d52;
}
</style>

</head>

<body>

<header>
<h1>Saylin AI Estimator</h1>
<p>Instant South African Construction Cost Estimate</p>
</header>

<section>

<label>Building Size (m²)</label>
<input type="number" id="size">

<label>Building Type</label>
<select id="type">
<option>Residential</option>
<option>Commercial</option>
</select>

<label>Finish Quality</label>
<select id="finish">
<option value="15500">Standard</option>
<option value="19000">Mid-range</option>
<option value="25000">Luxury</option>
</select>

<button onclick="estimate()">Calculate Estimate</button>

<div id="result"></div>

</section>

<script>

function estimate(){

var size=document.getElementById("size").value;

var rate=document.getElementById("finish").value;

var total=size*rate;

document.getElementById("result").innerHTML=
"Estimated Construction Cost:<br><br><strong>R "+
total.toLocaleString()+
"</strong>";

}

</script>

</body>
</html>
